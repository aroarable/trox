<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>404 - Not Found</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#0b0226;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:"Segoe UI",system-ui,sans-serif;
      color:#fff;
    }
    .wrap{text-align:center}
    .code{font-size:96px;font-weight:900;color:#3b0045;text-shadow:0 0 40px rgba(168,85,247,0.3);line-height:1}
    .msg{font-size:18px;color:#9a7ab0;margin-top:12px;font-weight:500;letter-spacing:0.04em}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="msg">Page not found.</div>
  </div>
</body>
</html>
