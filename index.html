<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mazge</title>
  <link href="fonts.googleapis.com/css2" rel="stylesheet" />
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ENTRY OVERLAY -->
  <div class="entry-overlay" id="entry-overlay">
    <div class="entry-text">click to enter...</div>
  </div>

  <!-- HIDDEN AUDIO -->
  <audio id="bg-audio" src="song.mp4" loop preload="auto"></audio>

  <!-- VOLUME CONTROL (TOP LEFT) -->
  <button class="volume-btn" id="volume-btn" aria-label="Toggle Volume">
    <svg id="icon-vol-on" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
    </svg>
    <svg id="icon-vol-off" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
  </button>

  <!-- TOP PLAY/PAUSE CONTROL -->


  <canvas id="bg-snow" aria-hidden="true"></canvas>
  <main class="page-bg">
    <section class="profile-card" id="profile-card">
      <div class="profile-inner">
        <div class="profile-header">
          <div class="avatar-large" aria-hidden="true">
            <img id="discord-avatar" class="avatar-img" src="aroarable_discord_profil_1.png" alt="Profil" />
            <img class="avatar-decoration"
              src="https://cdn.discordapp.com/avatar-decoration-presets/a_82e4df4028396ad5ccaaafb397fa6248.png" alt=""
              aria-hidden="true" />
          </div>
          <div class="title">
            <h1 class="username" id="username">'Mazge</h1>
            <p class="bio">
              <span id="typewriter" aria-live="polite"></span>
              <span class="cursor">|</span>
            </p>
          </div>
        </div>
        <div class="inner-panel">
          <div class="custom-music-card" aria-label="Now listening">
            <div class="cover-art">
              <!-- Animated green equalizer -->
              <div class="playing">
                <div class="greenline line-1"></div>
                <div class="greenline line-2"></div>
                <div class="greenline line-3"></div>
                <div class="greenline line-4"></div>
                <div class="greenline line-5"></div>
              </div>
            </div>
            <div class="music-details">
              <div class="music-title">yenildiğim tek savaştın</div>
              <div class="music-artist">ASLAR, Lessio, Astral</div>
              <div class="music-tags">
                <span class="tag-preview">Önizle</span>
                <span class="tag-e">E</span>
              </div>
            </div>
            <div class="music-controls">
              <button class="music-btn add-btn" aria-label="Add"><svg viewBox="0 0 24 24" width="20" height="20"
                  stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="8" x2="12" y2="16"></line>
                  <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg></button>
              <button class="music-btn more-btn" aria-label="More"><svg viewBox="0 0 24 24" width="20" height="20"
                  stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="6" cy="12" r="1.5" fill="currentColor"></circle>
                  <circle cx="12" cy="12" r="1.5" fill="currentColor"></circle>
                  <circle cx="18" cy="12" r="1.5" fill="currentColor"></circle>
                </svg></button>
              <button class="music-btn play-pause-btn" id="main-play-btn" aria-label="Play/Pause">
                <svg id="icon-play" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                  <path d="M8 5v14l11-7z" />
                </svg>
                <svg id="icon-pause" style="display:none;" viewBox="0 0 24 24" width="20" height="20"
                  fill="currentColor">
                  <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
              </button>
            </div>
            <div class="spotify-logo">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path
                  d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.563.387-.857.207-2.35-1.434-5.305-1.76-8.784-.963-.332.075-.664-.133-.74-.465-.076-.332.134-.665.466-.74 3.82-.876 7.076-.496 9.71 1.104.293.18.386.563.205.857zm1.143-3.064c-.227.37-.706.49-1.077.263-2.684-1.646-6.8-2.14-9.768-1.17-.417.135-.863-.092-.998-.51-.135-.417.092-.863.51-.998 3.42-1.12 8.01-.586 11.07 1.294.37.227.49.707.263 1.078zm.106-3.195C14.61 8.25 9.4 8.064 6.55 8.93c-.495.148-1.016-.13-1.164-.627-.148-.495.13-1.015.627-1.164 3.31-.99 9.07-.773 12.95 1.536.44.262.585.842.32 1.284-.263.442-.843.587-1.284.322z" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="action-wrap">
      <div class="action-grid">


        <a class="action-btn action-namemc" href="https://tr.namemc.com/profile/Mazge.1" target="_blank"
          rel="noopener noreferrer" aria-label="NameMC">
          <div class="action-left">
            <div class="action-icon action-icon-namemc" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="30" height="30">
                <rect width="64" height="64" rx="8" fill="#5d3a1a" />
                <rect x="0" y="0" width="64" height="24" rx="6" fill="#4caf50" />
                <rect x="0" y="20" width="64" height="5" fill="#388e3c" />
                <rect x="8" y="30" width="6" height="6" rx="1" fill="#6d4c41" />

                <rect x="30" y="4" width="4" height="11" rx="2" fill="#66bb6a" />
                <rect x="42" y="2" width="4" height="13" rx="2" fill="#a5d6a7" />
                <rect x="53" y="5" width="4" height="10" rx="2" fill="#66bb6a" />
              </svg>
            </div>
            <div class="action-text">
              <div class="small">MINECRAFT PROFILE</div>
              <div class="big">NameMC</div>
            </div>
          </div>
          <div class="action-right">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
              <path d="M15 3h6v6" />
              <path d="M10 14L21 3" />
            </svg>
          </div>
        </a>

        <a class="action-btn action-mlogo" href="https://movyra.com.tr/" target="_blank" rel="noopener noreferrer"
          aria-label="Mazge M">
          <div class="action-left">
            <div class="action-icon action-icon-mlogo" aria-hidden="true">
              <img src="android-chrome-192x192.png" alt="M"
                style="width:34px;height:34px;object-fit:contain;border-radius:4px;" />
            </div>
            <div class="action-text">
              <div class="small small-red">MY PROJECT</div>
              <div class="big">Movyra WEB</div>
            </div>
          </div>
          <div class="action-right">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
              <path d="M15 3h6v6" />
              <path d="M10 14L21 3" />
            </svg>
          </div>
        </a>

        <a class="action-btn action-movyra" href="https://www.youtube.com/@vhros" target="_blank"
          rel="noopener noreferrer" aria-label="Movyra">
          <div class="action-left">
            <div class="action-icon action-icon-movyra" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 576 512"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
                <path
                  d="M549.7 124.1C543.5 100.4 524.9 81.8 501.4 75.5 458.9 64 288.1 64 288.1 64S117.3 64 74.7 75.5C51.2 81.8 32.7 100.4 26.4 124.1 15 167 15 256.4 15 256.4s0 89.4 11.4 132.3c6.3 23.6 24.8 41.5 48.3 47.8 42.6 11.5 213.4 11.5 213.4 11.5s170.8 0 213.4-11.5c23.5-6.3 42-24.2 48.3-47.8 11.4-42.9 11.4-132.3 11.4-132.3s0-89.4-11.4-132.3zM232.2 337.6l0-162.4 142.7 81.2-142.7 81.2z" />
              </svg>
            </div>
            <div class="action-text">
              <div class="small small-red">youtube</div>
              <div class="big">troxway</div>
            </div>
          </div>
          <div class="action-right">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
              <path d="M15 3h6v6" />
              <path d="M10 14L21 3" />
            </svg>
          </div>
        </a>

        <!-- Discord copy -->
        <div class="action-btn action-discord action-discord-copy" id="discord-copy-btn" role="button" tabindex="0"
          aria-label="Discord kullanıcı adını kopyala">
          <div class="action-left">
            <div class="action-icon action-icon-discord" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="#5865F2">

                  d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" />
              </svg>
            </div>
            <div class="action-text">
              <div class="small">DISCORD</div>
              <div class="big discord-username-wrap">
                <span id="discord-name-text">vhros</span>
                <span class="copy-hint" id="copy-hint">tıkla &amp; kopyala</span>
              </div>
            </div>
          </div>
          <div class="action-right">
            <svg id="icon-copy" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">

              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <svg id="icon-check" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
              style="display:none">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
        </div>

      </div>
    </div>

  </main>
  <script src="script.js"></script>
  <script src="protect.js"></script>
</body>

</html>
